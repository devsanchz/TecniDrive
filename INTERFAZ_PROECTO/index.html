<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - TecniDrive</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

    <!-- INICIAR SESION -->
<div class="login-container">

  <h1>Login</h1>

  <form id="loginForm">
  <label>Usuario</label>
  <input type="text" id="usuario" placeholder="usuario" required>

  <label>Contraseña</label>
  <input type="password" id="password" placeholder="contraseña" required>

  <button type="submit">Ingresar</button>
</form>

  <div class="links">
    <a href="#">¿Olvidaste tu contraseña?</a>
     <a href="#" onclick="mostrarSign()">No tienes cuenta? Registrate</a>
  </div>

  <div class="contact">
    <p><strong>Email:</strong> TecDrive01@gmail.com</p>
    <p>Para obtener más ayuda, por favor llame a nuestra línea de soporte al 123-456-7890</p>
  </div>
</div>


   <!-- REGISTRARSE-->
<div class="login-container">

 

  <form id="signForm">
     <h1>Sing in</h1>
  <label>Nombres</label>
  <input type="text"  placeholder="Primer nombre" required>
  <input type="text"  placeholder="Segundo nombre (opcional)">
   <label>Apellidos</label>
  <input type="text"  placeholder="Primer apellido" required>
  <input type="text" placeholder="Segundo apellido" required>
<label>Correo</label>
  <input type="email"  placeholder="email" required>
  <label>Contraseña</label>
  <input type="password" placeholder="contraseña" required>
  <button type="submit">Registrarse</button>

  <div class="links">
      <a href="#" onclick="mostrarLogin()">Ya estas registrado? inicia sesión</a>
  </div>
</form>

  
</div>
</body>
<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
  e.preventDefault();

  let usuario = document.getElementById("usuario").value.trim().toLowerCase();
  let password = document.getElementById("password").value.trim();

  if (usuario === "administrador" && password === "1234") {
    window.location.href = "panel_admin.html";
  } 
  else if (usuario === "propietario" && password === "4321") {
    window.location.href = "panel_propietario.html";
  } 
  else if (usuario === "mecanico" && password === "5678") {
    window.location.href = "panel_mecanico.html";
  } 
  else {
    alert("Usuario o contraseña incorrectos");
  }
});

//MOSREAR Y OCULTAR FORMULARIOS
function mostrarSign() {
  document.querySelectorAll(".login-container")[0].style.display = "none";
  document.querySelectorAll(".login-container")[1].style.display = "block";
}

function mostrarLogin() {
  document.querySelectorAll(".login-container")[1].style.display = "none";
  document.querySelectorAll(".login-container")[0].style.display = "block";}
</script>
</html>
