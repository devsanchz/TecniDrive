<!DOCTYPE html>
<html>
<head>
<style>
/* CSS CORREGIDO */
.tabla {
  display: flex;
  gap: 25px;
  background: rgb(244, 243, 243);
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  max-width: 690px; 
  margin: 20px auto;
}

/* IZQUIERDA - VERTICAL (uno debajo del otro) */
.iz {
  flex: 1;
  display: flex;
  flex-direction: column; /* ← VERTICAL */
  gap: 15px;
  padding: 20px;
  max-width: 220px; /* ← FIJO PEQUEÑO */
}

.cuadro-iz {
  background:rgb(247, 245, 245);
  box-shadow: 0 8px 20px rgba(30,60,114,0.2);
  padding: 18px 15px;
  border-radius: 12px;
  text-align: center;
  
}

.cuadro-iz h3 {
  font-size: 19px;
  color: #f18220;
  margin-bottom: 6px;
}

.cuadro-iz .valor {
  font-size: 20px;
  font-weight: bold;
  color: #171718;
}

/* DERECHA - MÁS COMPACTA */
.der span{
    margin-left: 20px;
    background-color: #4caf4f8c;
    color: #276e29;
  padding: 0 2px;
  border-radius: 5px;
}

/* DOCUMENTOS - HORIZONTAL (lado a lado) */
.doc {
  margin-bottom: 30px;
}

.doc h2 {
  color: #1e3c72;
  font-size: 23px;
  text-align: center;
}

.doc .cuadro {
  display: inline-block;
  background: #6fc8d8c8;
   margin-left: 25px;
  border-radius: 10px;
  margin-right: 18px;    
  width: 150px;         

}

.cuadro p {
  font-weight: 700;
  color: #0f0f0f;
  font-size: 20px;
  text-align: center;

}

.cuadro form {
  display: none;
  text-align: center;
  padding-top: 10px;
}


.cuadro button[type="submit"] {
    text-align: center;
  background: #4caf50;
  color: white;
  border: none;
  padding: 5px 5px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 700;
}
.cuadro .btn-registrar{
   margin-right: 40px;
}

.btn-registrar {
  background: #ff6b35d6;
  color: white;
  border: none;
  padding: 5px 5px;
  border-radius: 0 0 2px 2px;
  cursor: pointer;
  font-weight: 700;
  width: 100%;
 
}

.btn-registrar:hover {
  background: #e55a2b;
}

/* ESTADO - COMPACTO */
.estado {
  background: #dddfe0;
 padding: 5px;
  border-radius: 10px;
  text-align: center;
}

.estado h2 {
  color: #1e3c72;
  margin-bottom: 18px;
  font-size: 23px;
}

.estado form {
  display: none;
  margin-top: 18px;
}

.Activo, .inactivo {
  background: #979b97;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 700;
  margin: 0 10px 10px 0;
}

.inactivo {
  background: #f44336;
}

.Activo:hover, .inactivo:hover {
  transform: translateY(-2px);
}
</style>
</head>
<body>

<!-- TU TABLA OPTIMIZADA -->
<div class="tabla">
  <!-- IZQUIERDA - VERTICAL -->
  <div class="iz">
    <div class="cuadro-iz">
      <h3>Placa</h3>
      <div class="valor">AJK203</div>
    </div>
    <div class="cuadro-iz">
      <h3>Kilometraje</h3>
      <div class="valor">120,000 Km</div>
    </div>
    <div class="cuadro-iz">
      <h3>Chasis</h3>
      <div class="valor">JT2BG22KX12045678</div>
    </div>
  </div>
  
  <!-- DERECHA -->
  <div class="der">
    <h1>Toyota Corolla 2022 <span>Activo</span></h1>
    <!-- DOCUMENTOS HORIZONTAL -->
    <div class="doc">
      <h2>Documentos Vehiculares</h2>
      <div class="cuadro">
        <p>SOAT</p>
        <button type="button" class="btn-registrar" onclick="toggleForm(this)">Registrar</button>
        <form>
            <small>F.Expedición</small>
          <input type="date"><br><br>
           <small>F.Vigencia</small>
          <input type="date"><br><br>
          <button type="submit">Guardar</button>
        </form>
      </div>
      
      <div class="cuadro">
        <p>Tecnomecánica</p>
        <button type="button" class="btn-registrar" onclick="toggleForm(this)">Registrar</button>
        <form>
             <small>F.Expedición</small>
          <input type="date"><br><br>
            <small>F.Vigencia</small>
          <input type="date"><br><br>
          <button type="submit">Guardar</button>
        </form>
      </div>
    </div>

    <!-- ESTADO -->
    <div class="estado">
      <h2>Cambiar estado del vehículo</h2>
      <button class="Activo">Activar</button>
      <button class="inactivo" onclick="toggleEstadoForm()">Desactivar</button>
      <form>
        <label>Motivo:</label>
        <input type="text" placeholder="Razón...">
        <button type="submit">Confirmar</button>
      </form>
    </div>
  </div>
</div>

<script>
function toggleForm(btn) {
  const form = btn.nextElementSibling;
  form.style.display = form.style.display === 'block' ? 'none' : 'block';
}

function toggleEstadoForm() {
  const form = document.querySelector('.estado form');
  form.style.display = form.style.display === 'block' ? 'none' : 'block';
}
</script>

</body>
</html>
