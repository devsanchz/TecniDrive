    <!-- avatar -->

</button>
  </div>
<!-- la informacion del ti@ -->
     <ul class="datos">
      <div id="formEditar" class="form-editar">
  <input type="text" id="inputNombre" placeholder="Nombre">
  <input type="email" id="inputCorreo" placeholder="Correo">
  <input type="text" id="inputTelefono" placeholder="Teléfono" maxlength="10">
  <button id="guardarCambios">Actualizar</button>
</div>
<h1> Informacion del perfil 
  <i class="bi bi-pencil-square" id="btnEditar"></i>
   </h1>
    <li> <span id="nombreUsuario">Katherin Patiño Tapia</span></li>
    <li> <span id="cargousuario">Propietario</span></li>
    <li><i class="bi bi-envelope-at-fill"></i> <span id="correousuario">katerintapia@gmail.com</span></li>
    <li><i class="bi bi-telephone-plus-fill"></i><span id="telefonousuario">agregar numero</span> </li>
  </ul>
</section>

<script>
   document.addEventListener("DOMContentLoaded", () => {

  // COLORES ROL
  const cargo = document.getElementById("cargousuario");
  const texto = cargo.textContent.toLowerCase();

  if (texto.includes("administrador")) {
    cargo.classList.add("administrador");
  } else if (texto.includes("propietario")) {
    cargo.classList.add("propietario");
  } else if (texto.includes("mecanico")) {
    cargo.classList.add("mecanico");
  }

 // PARA ACTUALIZAR DATOS
const btnEditar = document.getElementById("btnEditar");
const form = document.getElementById("formEditar");

const nombreElemento = document.getElementById("nombreUsuario");
const correoElemento = document.getElementById("correousuario");
const telefonoElemento = document.getElementById("telefonousuario");

const inputNombre = document.getElementById("inputNombre");
const inputCorreo = document.getElementById("inputCorreo");
const inputTelefono = document.getElementById("inputTelefono");

const btnGuardar = document.getElementById("guardarCambios");

//validar que todo exista
if (btnEditar && form && nombreElemento && correoElemento && telefonoElemento) {

  // mostrar formulario
  btnEditar.addEventListener("click", () => {
    form.style.display = "flex";

    inputNombre.value = nombreElemento.textContent;
    inputCorreo.value = correoElemento.textContent;
    inputTelefono.value = telefonoElemento.textContent;
  });

  // guardar cambios
  btnGuardar.addEventListener("click", () => {
    nombreElemento.textContent = inputNombre.value;
    correoElemento.textContent = inputCorreo.value;
    telefonoElemento.textContent = inputTelefono.value;

    form.style.display = "none";
  });

}
});
</script>
